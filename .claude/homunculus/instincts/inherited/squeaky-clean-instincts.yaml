# Squeaky Clean Workflow Cross Platform Bugfix And Test Extension

## Action

Follow the cross-platform-bugfix-and-test-extension workflow:
1. Identify and fix platform-specific issues in implementation files (src/cleaners/, src/utils/)
2. Update or add new tests in src/__tests__/ to cover the fixed behaviors
3. Add or update OS-specific test suites in src/__tests__/os/
4. Update CI configuration to ensure new tests run on all platforms

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/cleaners/*.ts, src/utils/*.ts, src/__tests__/**/*.test.ts

