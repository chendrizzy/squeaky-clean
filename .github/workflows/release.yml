name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - current
          - patch
          - minor
          - major
          - prerelease
      prerelease_id:
        description: 'Prerelease identifier (beta, alpha, rc)'
        required: false
        default: 'beta'
  
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write  # For npm provenance with OIDC
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      
      # Manual version bump (when triggered via workflow_dispatch)
      - name: Bump version manually
        if: github.event_name == 'workflow_dispatch'
        id: manual_version
        run: |
          if [ "${{ github.event.inputs.version_type }}" == "current" ]; then
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            git fetch --tags --force

            if git rev-parse "v$NEW_VERSION" >/dev/null 2>&1; then
              echo "Tag v$NEW_VERSION already exists, publishing current version."
            else
              git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
              git push origin "v$NEW_VERSION"
            fi

            exit 0
          fi

          # Determine version bump command
          if [ "${{ github.event.inputs.version_type }}" == "prerelease" ]; then
            npm version prerelease --preid=${{ github.event.inputs.prerelease_id }} --no-git-tag-version
          else
            npm version ${{ github.event.inputs.version_type }} --no-git-tag-version
          fi
          node scripts/remove-self-dependency.js
          
          # Get the new version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # Update version in src/cli.ts
          sed -i "s/version: '[^']*'/version: '$NEW_VERSION'/" src/cli.ts
          
          # Commit and tag
          git add package.json package-lock.json src/cli.ts
          git commit -m "chore(release): v$NEW_VERSION"
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          
          # Push changes
          git push origin main
          git push origin "v$NEW_VERSION"
      
      # Extract version from tag (when triggered by tag push)
      - name: Extract version from tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        id: tag_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Build project
        run: npm run build
      
      - name: Run tests
        run: npm test
      
      - name: Generate changelog
        id: changelog
        run: |
          # Get the current version
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ steps.manual_version.outputs.version }}"
          else
            VERSION="${{ steps.tag_version.outputs.version }}"
          fi
          
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            # First release
            echo "changelog=Initial release of squeaky-clean v$VERSION" >> $GITHUB_OUTPUT
          else
            # Generate changelog from commits
            CHANGELOG=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" | grep -v "^- chore" | head -20)
            
            if [ -z "$CHANGELOG" ]; then
              CHANGELOG="- Minor updates and improvements"
            fi
            
            # Save to output
            {
              echo 'changelog<<EOF'
              echo "## What's Changed"
              echo ""
              echo "$CHANGELOG"
              echo ""
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...v$VERSION"
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub Release with gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.manual_version.outputs.version || steps.tag_version.outputs.version }}"
          TAG_NAME="v$VERSION"
          
          # Prepare release arguments
          RELEASE_ARGS=(
            "$TAG_NAME"
            --title "Release $TAG_NAME"
            --notes "${{ steps.changelog.outputs.changelog }}"
          )
          
          # Add prerelease flag if needed
          if [[ "$VERSION" == *"-"* ]]; then
            RELEASE_ARGS+=( --prerelease )
          fi
          
          # Create or update the release (idempotent)
          if gh release view "$TAG_NAME" &>/dev/null; then
            echo "Release $TAG_NAME already exists, updating..."
            gh release edit "$TAG_NAME" --title "Release $TAG_NAME" --notes "${{ steps.changelog.outputs.changelog }}"
          else
            echo "Creating release $TAG_NAME..."
            gh release create "${RELEASE_ARGS[@]}"
          fi

          # Upload assets (--clobber handles existing files)
          gh release upload "$TAG_NAME" dist/*.tgz dist/*.js README.md LICENSE --clobber || true
      
      - name: Publish to npm with provenance (if not prerelease)
        if: ${{ !contains(steps.manual_version.outputs.version || steps.tag_version.outputs.version, '-') }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view squeaky-clean@$VERSION version &>/dev/null; then
            echo "Version $VERSION already published to npm, skipping..."
          else
            echo "Publishing version $VERSION to npm..."
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          SQUEAKY_CLEAN_SKIP_HOMEBREW_UPDATE: true

      - name: Update Homebrew tap formula
        if: ${{ !contains(steps.manual_version.outputs.version || steps.tag_version.outputs.version, '-') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.manual_version.outputs.version || steps.tag_version.outputs.version }}"
          TARBALL_URL="https://registry.npmjs.org/squeaky-clean/-/squeaky-clean-${VERSION}.tgz"
          
          # Wait for npm to propagate the new version
          echo "Waiting for npm to propagate v${VERSION}..."
          for i in $(seq 1 30); do
            if curl -sL --head "$TARBALL_URL" | grep -q "200"; then
              echo "npm tarball available."
              break
            fi
            echo "Attempt $i/30: not yet available, waiting 10s..."
            sleep 10
          done
          
          # Get SHA256 of the new tarball
          SHA256=$(curl -sL "$TARBALL_URL" | shasum -a 256 | awk '{print $1}')
          
          if [ -z "$SHA256" ] || [ "$SHA256" == "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]; then
            echo "ERROR: Failed to fetch tarball or got empty file"
            exit 1
          fi
          
          echo "Updating Homebrew tap formula to v${VERSION} (sha256: ${SHA256})"
          
          # Clone the tap repo, update the formula, and push
          git clone https://x-access-token:${GH_TOKEN}@github.com/chendrizzy/homebrew-squeaky-clean.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          
          sed -i "s|url \"https://registry.npmjs.org/squeaky-clean/-/squeaky-clean-.*\.tgz\"|url \"${TARBALL_URL}\"|" Formula/squeaky-clean.rb
          sed -i "s/sha256 \"[a-f0-9]*\"/sha256 \"${SHA256}\"/" Formula/squeaky-clean.rb
          
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/squeaky-clean.rb
          if git diff --cached --quiet; then
            echo "No changes to Homebrew formula, skipping."
          else
            git commit -m "Update squeaky-clean to v${VERSION}"
            git push origin main
          fi
          
          # Also update the in-repo copy
          cd $GITHUB_WORKSPACE
          sed -i "s|url \"https://registry.npmjs.org/squeaky-clean/-/squeaky-clean-.*\.tgz\"|url \"${TARBALL_URL}\"|" Formula/squeaky-clean.rb
          sed -i "s/sha256 \"[a-f0-9]*\"/sha256 \"${SHA256}\"/" Formula/squeaky-clean.rb
          git add Formula/squeaky-clean.rb
          if ! git diff --cached --quiet; then
            git commit -m "chore(brew): update formula to v${VERSION}"
            git push origin main
          fi
