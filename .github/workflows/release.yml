name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - current
          - patch
          - minor
          - major
          - prerelease
      prerelease_id:
        description: 'Prerelease identifier (beta, alpha, rc)'
        required: false
        default: 'beta'
  
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # For npm trusted publishing with OIDC
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'

      - name: Setup npm for trusted publishing
        run: |
          npm install -g npm@11
          npm config set registry https://registry.npmjs.org/
          node --version
          npm --version
      
      - name: Install dependencies
        run: npm ci
      
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      
      # Manual version bump (when triggered via workflow_dispatch)
      - name: Bump version manually
        if: github.event_name == 'workflow_dispatch'
        id: manual_version
        run: |
          if [ "${{ github.event.inputs.version_type }}" == "current" ]; then
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            git fetch --tags --force

            if git rev-parse "v$NEW_VERSION" >/dev/null 2>&1; then
              echo "Tag v$NEW_VERSION already exists, publishing current version."
            else
              git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
              git push origin "v$NEW_VERSION"
            fi

            exit 0
          fi

          # Determine version bump command
          if [ "${{ github.event.inputs.version_type }}" == "prerelease" ]; then
            npm version prerelease --preid=${{ github.event.inputs.prerelease_id }} --no-git-tag-version
          else
            npm version ${{ github.event.inputs.version_type }} --no-git-tag-version
          fi
          node scripts/remove-self-dependency.js
          
          # Get the new version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # Update version in src/cli.ts
          sed -i "s/version: '[^']*'/version: '$NEW_VERSION'/" src/cli.ts
          
          # Commit and tag
          git add package.json package-lock.json src/cli.ts
          git commit -m "chore(release): v$NEW_VERSION"
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          
          # Push changes
          git push origin main
          git push origin "v$NEW_VERSION"
      
      # Extract version from tag (when triggered by tag push)
      - name: Extract version from tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        id: tag_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate release version
        id: release
        run: |
          VERSION="${{ steps.manual_version.outputs.version || steps.tag_version.outputs.version }}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not determine release version"
            exit 1
          fi

          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "ERROR: Release version v${VERSION} does not match package.json version ${PACKAGE_VERSION}"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release secrets
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && steps.release.outputs.prerelease != 'true' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.AUTOMATION }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "ERROR: HOMEBREW_TAP_TOKEN or AUTOMATION secret is required to update the tap repo"
            exit 1
          fi
      
      - name: Build project
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        run: npm run build
      
      - name: Run tests
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        run: npm test

      - name: Pack release tarball
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        run: |
          rm -f dist/*.tgz
          npm pack --pack-destination dist
      
      - name: Generate changelog
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        id: changelog
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            # First release
            echo "changelog=Initial release of squeaky-clean v$VERSION" >> $GITHUB_OUTPUT
          else
            # Generate changelog from commits
            CHANGELOG=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" | grep -v "^- chore" | head -20)
            
            if [ -z "$CHANGELOG" ]; then
              CHANGELOG="- Minor updates and improvements"
            fi
            
            # Save to output
            {
              echo 'changelog<<EOF'
              echo "## What's Changed"
              echo ""
              echo "$CHANGELOG"
              echo ""
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...v$VERSION"
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub Release with gh CLI
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          TAG_NAME="${{ steps.release.outputs.tag }}"
          
          # Prepare release arguments
          RELEASE_ARGS=(
            "$TAG_NAME"
            --title "Release $TAG_NAME"
            --notes "${{ steps.changelog.outputs.changelog }}"
          )
          
          # Add prerelease flag if needed
          if [ "${{ steps.release.outputs.prerelease }}" = "true" ]; then
            RELEASE_ARGS+=( --prerelease )
          fi
          
          # Create or update the release (idempotent)
          if gh release view "$TAG_NAME" &>/dev/null; then
            echo "Release $TAG_NAME already exists, updating..."
            gh release edit "$TAG_NAME" --title "Release $TAG_NAME" --notes "${{ steps.changelog.outputs.changelog }}"
          else
            echo "Creating release $TAG_NAME..."
            gh release create "${RELEASE_ARGS[@]}"
          fi

          # Upload assets (--clobber handles existing files)
          gh release upload "$TAG_NAME" dist/*.tgz README.md LICENSE --clobber || true
      
      - name: Publish to npm with trusted publishing
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && steps.release.outputs.prerelease != 'true' }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          if npm view squeaky-clean@$VERSION version &>/dev/null; then
            echo "Version $VERSION already published to npm, skipping..."
          else
            echo "Publishing version $VERSION to npm..."
            unset NODE_AUTH_TOKEN
            unset NPM_CONFIG_USERCONFIG
            npm config set registry https://registry.npmjs.org/
            npm publish --access public
          fi
        env:
          SQUEAKY_CLEAN_SKIP_HOMEBREW_UPDATE: true

      - name: Update Homebrew tap formula
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && steps.release.outputs.prerelease != 'true' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.AUTOMATION }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          TARBALL_URL="https://registry.npmjs.org/squeaky-clean/-/squeaky-clean-${VERSION}.tgz"
          TARBALL_FILE=$(mktemp)
          TAP_DIR=$(mktemp -d)

          cleanup() {
            rm -f "$TARBALL_FILE"
            rm -rf "$TAP_DIR"
          }
          trap cleanup EXIT

          # Wait for npm to propagate the new version
          echo "Waiting for npm to propagate v${VERSION}..."
          for i in $(seq 1 30); do
            if curl -fsSL "$TARBALL_URL" -o "$TARBALL_FILE"; then
              echo "npm tarball available."
              break
            fi

            if [ "$i" = "30" ]; then
              echo "ERROR: Timed out waiting for npm tarball after 5 minutes"
              exit 1
            fi

            echo "Attempt $i/30: not yet available, waiting 10s..."
            sleep 10
          done
          
          # Get SHA256 of the new tarball
          SHA256=$(shasum -a 256 "$TARBALL_FILE" | awk '{print $1}')
          
          if [ -z "$SHA256" ] || [ "$SHA256" == "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]; then
            echo "ERROR: Failed to fetch tarball or got empty file"
            exit 1
          fi
          
          echo "Updating Homebrew tap formula to v${VERSION} (sha256: ${SHA256})"
          
          # Clone the tap repo, update the formula, and push
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/chendrizzy/homebrew-squeaky-clean.git" "$TAP_DIR"
          cd "$TAP_DIR"
          
          sed -i "s|url \"https://registry.npmjs.org/squeaky-clean/-/squeaky-clean-.*\.tgz\"|url \"${TARBALL_URL}\"|" Formula/squeaky-clean.rb
          sed -i "s/sha256 \"[a-f0-9]*\"/sha256 \"${SHA256}\"/" Formula/squeaky-clean.rb
          
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/squeaky-clean.rb
          if git diff --cached --quiet; then
            echo "No changes to Homebrew formula, skipping."
          else
            git commit -m "Update squeaky-clean to v${VERSION}"
            git push origin main
          fi
